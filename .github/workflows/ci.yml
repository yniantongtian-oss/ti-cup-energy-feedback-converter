name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  portable-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S firmware -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Run host demo
        run: ./build/converter_demo > demo.csv
      - name: Run dependency-free simulation
        run: python3 simulation/simulate.py --duration 0.1 --output simulation/output.csv
